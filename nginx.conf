server {
  listen 8080;
  root /app/public;
  index index.html;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css;
  gzip_min_length 1000;

  # Cache static assets
  location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # API proxy → Node server (same container, port 3016)
  location /api/ {
    proxy_pass http://127.0.0.1:3016/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket proxy → Node server
  location /ws {
    proxy_pass http://127.0.0.1:3016/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # Health check
  location /health {
    proxy_pass http://127.0.0.1:3016/health;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
