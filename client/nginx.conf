server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css;
  gzip_min_length 1000;

  # Cache static assets aggressively
  location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # API proxy → backend (Railway: VITE_API_URL is baked into JS; nginx proxies nothing at runtime)
  # We still proxy /api and /ws so the client can hit relative URLs if needed.
  location /api/ {
    proxy_pass http://BACKEND_HOST/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket proxy
  location /ws {
    proxy_pass http://BACKEND_HOST/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  # Health check (proxied to backend, or handled locally)
  location /health {
    proxy_pass http://BACKEND_HOST/health;
  }

  # SPA fallback — all routes served by index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
